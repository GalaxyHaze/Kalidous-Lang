name: Build and Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag para a Release'
        required: true
        default: 'v0.0.1'
  workflow_call:
    inputs:
      tag_name:
        type: string
        required: false

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.set-tag.outputs.tag }}
      release_id: ${{ steps.create-release.outputs.id }}
    steps:
      - id: set-tag
        run: |
          # Prioridade: Input manual > Input de chamada > Ref do Git
          TAG="${{ github.event.inputs.tag_name || inputs.tag_name || github.ref_name }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using tag: $TAG"

      - name: Create Release (Draft)
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.set-tag.outputs.tag }}
          generate_release_notes: true
          draft: true  # Começa como draft
          # Não envia ficheiros aqui para evitar conflito com jobs paralelos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for Release propagation
        run: sleep 3

  build-and-release:
    needs: create-release
    name: Build on ${{ matrix.os }} (${{ matrix.target_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_name: zith-linux-amd64
            cmake_flags: "-DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++"
            setup_apt: "sudo apt-get update && sudo apt-get install -y ninja-build clang"
          - os: macos-latest
            target_name: zith-macos-arm64
            cmake_flags: "-DCMAKE_OSX_ARCHITECTURES=arm64"
            setup_brew: "brew install ninja"
          - os: windows-latest
            target_name: zith-windows-amd64.exe
            cmake_flags: "-A x64"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- Setup & Cache ---
      
      # Cache APT packages (Linux)
      - name: Cache APT packages (Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ninja-build clang libssl-dev pkg-config
          version: 1.0
        continue-on-error: true # Se falhar, instalamos no próximo passo de qualquer forma

      # Setup Clang/Ninja manualmente (Fallback garante que o build nunca falha por falta de ferramenta)
      - name: Install Build Tools (Fallback)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ runner.os }}" == "Linux" ]; then
             ${{ matrix.setup_apt }}
          elif [ "${{ runner.os }}" == "macOS" ]; then
             ${{ matrix.setup_brew }}
          fi
        shell: bash

      - name: Setup CMake
        uses: lukka/get-cmake@latest
        with:
          cmake-version: '3.27.x'

      # --- Build ---

      - name: Restore CMake cache
        uses: actions/cache@v4
        with:
          path: |
            build
            ~/.ccache
          key: ${{ runner.os }}-cmake-${{ matrix.target_name }}-${{ hashFiles('CMakeLists.txt', 'src/**') }}
          restore-keys: |
            ${{ runner.os }}-cmake-${{ matrix.target_name }}-
            ${{ runner.os }}-cmake-

      - name: Configure CMake
        run: |
          cmake -B build \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            ${{ matrix.cmake_flags }} \
            -DZITH_VERSION=${{ needs.create-release.outputs.tag }}
        shell: bash

      - name: Build
        run: cmake --build build --config Release --parallel
        shell: bash

      # --- Prepare Artifact ---

      - name: Prepare Artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            BINARY_NAME="zith.exe"
          else
            BINARY_NAME="zith"
          fi
          
          # Encontra e copia o binário
          if ! find build -type f -name "$BINARY_NAME" -print -quit | xargs -I {} cp {} "artifacts/${{ matrix.target_name }}"; then
            echo "Error: Binary not found"
            exit 1
          fi
          
          # Permissões Unix
          if [[ "${{ runner.os }}" != "Windows" ]]; then
            chmod +x artifacts/${{ matrix.target_name }}
          fi
          
          ls -lh artifacts/

      # --- Upload (Mantendo como Draft) ---
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: artifacts/*
          draft: true # IMPORTANTE: Mantém como draft para não conflitar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Removemos continue-on-error para garantir que falhas parem o job específico
        # mas fail-fast: false na estratégia permite que outros continuem.

      - name: Cleanup
        if: always()
        run: rm -rf build

  # Job final para publicar a release
  publish-release:
    needs: [create-release, build-and-release]
    runs-on: ubuntu-latest
    # Só roda se nenhum dos builds anteriores falhou (cancelados são ignorados)
    if: ${{ !contains(needs.*.result, 'failure') }}
    
    steps:
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          draft: false  # Agora publica
          prerelease: ${{ contains(needs.create-release.outputs.tag, 'alpha') || contains(needs.create-release.outputs.tag, 'beta') || contains(needs.create-release.outputs.tag, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
