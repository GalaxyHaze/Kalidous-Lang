name: Build and Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag para a Release (ex: v1.0.0)'
        required: false
        default: 'v0.0.1'
  workflow_call:
    inputs:
      tag_name:
        type: string
        required: false

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Criar Release (Draft) para evitar Race Conditions
  # ─────────────────────────────────────────────────────────────────────────────
    # ─────────────────────────────────────────────────────────────────────────────
  # 1. Criar Release (Draft) para evitar Race Conditions
  # ─────────────────────────────────────────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get_tag.outputs.tag }}
    steps:
      - name: Get Tag Name
        id: get_tag
        run: |
          TAG="${{ github.event.inputs.tag_name || github.ref_name }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Deploying tag: $TAG"

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          draft: true
          generate_release_notes: true
          # Removido 'files: []' para evitar erro de parsing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Matrix Padrão (Linux, macOS, Windows)
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-release:
    needs: create-release
    name: Build on ${{ matrix.os }} (${{ matrix.target_name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux (x64) ──────────────────────────────────────────────────────
          - os: ubuntu-latest
            target_name: zith-linux-amd64
            cache_id: linux-amd64
            install_cmd: sudo apt-get update && sudo apt-get install -y ninja-build

          # ── Linux (ARM64, cross-compiled) ─────────────────────────────────────
          - os: ubuntu-latest
            target_name: zith-linux-arm64
            cache_id: linux-arm64
            install_cmd: sudo apt-get update && sudo apt-get install -y ninja-build gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu
            cmake_flags: >-
              -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc
              -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++
              -DCMAKE_CROSSCOMPILING=ON

          # ── macOS Intel (x64, cross-compiled from ARM runner) ─────────────────
          - os: macos-latest
            target_name: zith-macos-amd64
            cache_id: macos-amd64
            install_cmd: brew install ninja
            cmake_flags: -DCMAKE_OSX_ARCHITECTURES=x86_64 -DCMAKE_CROSSCOMPILING=ON

          # ── macOS Apple Silicon (ARM64) ───────────────────────────────────────
          - os: macos-latest
            target_name: zith-macos-arm64
            cache_id: macos-arm64
            install_cmd: brew install ninja

          # ── Windows x64 ──────────────────────────────────────────────────────
          - os: windows-latest
            target_name: zith-windows-amd64.exe
            cache_id: windows-amd64
            install_cmd: choco install ninja -y
            msvc_arch: amd64

          # ── Windows ARM64 (cross-compiled from x64 host) ─────────────────────
          - os: windows-latest
            target_name: zith-windows-arm64.exe
            cache_id: windows-arm64
            install_cmd: choco install ninja -y
            msvc_arch: amd64_arm64
            cmake_flags: -DCMAKE_CROSSCOMPILING=ON

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.26.x'

      # --- CACHING ---
      
      # Cache APT packages (Linux)
      - name: Cache APT packages
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ninja-build gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu
          version: ${{ matrix.cache_id }} # Chave única por config

      # Cache Homebrew (macOS)
      - name: Cache Homebrew
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Homebrew
          key: ${{ runner.os }}-homebrew-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-homebrew-

      # Cache Build Directory (CMake objects)
      - name: Cache CMake Build
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-build-${{ matrix.cache_id }}-${{ hashFiles('src/**', 'CMakeLists.txt', 'cmake/**') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ matrix.cache_id }}-
            ${{ runner.os }}-build-

      # --- BUILD STEPS ---

      - name: Install Dependencies
        # Fallback se cache falhar
        run: ${{ matrix.install_cmd }}

      - name: Setup MSVC Dev Environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_flags }} -DZITH_VERSION=${{ needs.create-release.outputs.tag }}

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare Artifact
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ runner.os }}" == "Windows" ]; then
            cp build/bin/zith.exe "artifacts/${{ matrix.target_name }}"
          else
            chmod +x build/bin/zith
            cp build/bin/zith "artifacts/${{ matrix.target_name }}"
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: artifacts/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. musl static builds (x86_64 + ARM64) via Zig toolchain
  # ─────────────────────────────────────────────────────────────────────────────
  build-musl:
    needs: create-release
    name: Build Linux musl static (${{ matrix.target_name }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: zith-linux-amd64-musl
            zig_target: x86_64-linux-musl
          - target_name: zith-linux-arm64-musl
            zig_target: aarch64-linux-musl

    steps:
      - uses: actions/checkout@v4

      - name: Cache Zig Installation
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            ~/.zigup  # Se usar zigup, mas aqui usamos setup-zig
          key: zig-${{ runner.os }}-0.13.0
          restore-keys: |
            zig-${{ runner.os }}-

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install Build Tools
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Cache CMake Build (Musl)
        uses: actions/cache@v4
        with:
          path: build
          key: musl-${{ matrix.zig_target }}-build-${{ hashFiles('src/**', 'CMakeLists.txt') }}
          restore-keys: |
            musl-${{ matrix.zig_target }}-build-
            musl-build-

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="zig;cc;-target;${{ matrix.zig_target }}" \
            -DCMAKE_CXX_COMPILER="zig;c++;-target;${{ matrix.zig_target }}" \
            -DZITH_VERSION=${{ needs.create-release.outputs.tag }} \
            -DCMAKE_EXE_LINKER_FLAGS="-static" \
            -DCMAKE_CROSSCOMPILING=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare Artifact
        run: |
          mkdir -p artifacts
          chmod +x build/bin/zith
          cp build/bin/zith artifacts/${{ matrix.target_name }}
          file artifacts/${{ matrix.target_name }}
          ldd artifacts/${{ matrix.target_name }} || echo "Static binary confirmed"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: artifacts/${{ matrix.target_name }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. WebAssembly (Emscripten)
  # ─────────────────────────────────────────────────────────────────────────────
  build-wasm:
    needs: create-release
    name: Build WebAssembly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Emscripten
        uses: actions/cache@v4
        with:
          path: |
            emsdk
            ~/.emscripten_cache
          key: emsdk-${{ runner.os }}-3.1.45
          restore-keys: |
            emsdk-${{ runner.os }}-

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.45
          # A action setup-emsdk já tem cache interno, mas explicitamos acima para garantir robustez

      - name: Cache CMake Build (WASM)
        uses: actions/cache@v4
        with:
          path: build-wasm
          key: wasm-build-${{ hashFiles('src/**', 'CMakeLists.txt') }}
          restore-keys: |
            wasm-build-

      - name: Configure CMake
        run: |
          emcmake cmake -B build-wasm \
            -DCMAKE_BUILD_TYPE=Release \
            -DZITH_VERSION=${{ needs.create-release.outputs.tag }} \
            -DCMAKE_CROSSCOMPILING=ON

      - name: Build WASM
        run: cmake --build build-wasm --config Release -j$(nproc)

      - name: Prepare Artifact (zip)
        run: |
          mkdir -p artifacts wasm-staging
          
          # Copia apenas o que importa
          if [ -d "build-wasm/bin" ]; then
             cp build-wasm/bin/* wasm-staging/
          else
             find build-wasm -maxdepth 1 -type f \( -name "*.wasm" -o -name "*.js" \) -exec cp {} wasm-staging/ \;
          fi
          
          if [ -z "$(ls -A wasm-staging/)" ]; then
            echo "Error: No WASM files found."
            exit 1
          fi
          
          cd wasm-staging && zip -r ../artifacts/zith-wasm.zip . && cd ..
          ls -lh artifacts/

      - name: Upload WASM
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: artifacts/zith-wasm.zip
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
