name: Build and Release (Clang Only)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag para a Release (ex: v1.0.0)'
        required: false
        default: 'v0.0.1.0'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get_tag.outputs.tag }}
    steps:
      - name: Get Tag Name
        id: get_tag
        run: |
          TAG="${{ github.event.inputs.tag_name || github.ref_name }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    needs: create-release
    name: Build Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-18 lld-18
          sudo ln -sf /usr/bin/clang-18 /usr/bin/clang
          sudo ln -sf /usr/bin/clang++-18 /usr/bin/clang++
          sudo ln -sf /usr/bin/ld.lld-18 /usr/bin/ld.lld-18
          sudo ln -sf /usr/bin/ld.lld-18 /usr/bin/ld.lld
        shell: bash

      - name: Verify Clang
        run: clang --version && clang++ --version
        shell: bash

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DENABLE_WERROR=OFF \
            -DZITH_VERSION=${{ needs.create-release.outputs.tag }} \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_LINKER=ld.lld
        shell: bash

      - name: Build
        run: cmake --build build --config Release -j$(nproc)
        shell: bash

      - name: Prepare Artifact
        run: |
          mkdir -p artifacts
          chmod +x build/bin/zith
          cp build/bin/zith artifacts/zith-linux-amd64
          file artifacts/zith-linux-amd64
        shell: bash

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: artifacts/zith-linux-amd64
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-musl:
    needs: create-release
    name: Build Linux musl x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-18 lld-18 musl-tools musl-dev
          sudo ln -sf /usr/bin/clang-18 /usr/bin/clang
          sudo ln -sf /usr/bin/clang++-18 /usr/bin/clang++
          sudo ln -sf /usr/bin/ld.lld-18 /usr/bin/ld.lld
        shell: bash

      - name: Configure CMake (musl)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DENABLE_WERROR=OFF \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER_TARGET=x86_64-unknown-linux-musl \
            -DCMAKE_CXX_COMPILER_TARGET=x86_64-unknown-linux-musl \
            -DCMAKE_EXE_LINKER_FLAGS="-static -fuse-ld=lld" \
            -DZITH_VERSION=${{ needs.create-release.outputs.tag }} \
            -DCMAKE_CROSSCOMPILING=ON
        shell: bash

      - name: Build
        run: cmake --build build --config Release -j$(nproc)
        shell: bash

      - name: Prepare Artifact
        run: |
          mkdir -p artifacts
          chmod +x build/bin/zith
          cp build/bin/zith artifacts/zith-linux-amd64-musl
          file artifacts/zith-linux-amd64-musl
          echo "=== Static binary check ==="
          ldd artifacts/zith-linux-amd64-musl 2>&1 || echo "Binary is static"
        shell: bash

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: artifacts/zith-linux-amd64-musl
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    needs: create-release
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Install Dependencies
        run: brew install ninja llvm
        shell: bash

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DENABLE_WERROR=OFF \
            -DZITH_VERSION=${{ needs.create-release.outputs.tag }} \
            -DCMAKE_C_COMPILER=$(brew --prefix llvm)/bin/clang \
            -DCMAKE_CXX_COMPILER=$(brew --path llvm)/bin/clang++ \
            -DCMAKE_LINKER=$(brew --path llvm)/bin/ld64.lld
        shell: bash

      - name: Build
        run: cmake --build build --config Release -j$(nproc)
        shell: bash

      - name: Prepare Artifact
        run: |
          mkdir -p artifacts
          cp build/bin/zith artifacts/zith-macos-amd64
        shell: bash

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: artifacts/zith-macos-amd64
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: create-release
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Install Dependencies
        run: choco install llvm ninja -y
        shell: bash

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DENABLE_WERROR=OFF \
            -DZITH_VERSION=${{ needs.create-release.outputs.tag }} \
            -DCMAKE_C_COMPILER=clang-cl \
            -DCMAKE_CXX_COMPILER=clang-cl
        shell: bash

      - name: Build
        run: cmake --build build --config Release -j$env:NUMBER_OF_PROCESSORS
        shell: bash

      - name: Prepare Artifact
        run: |
          mkdir -p artifacts
          cp build/bin/zith.exe artifacts/zith-windows-amd64.exe
        shell: bash

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: artifacts/zith-windows-amd64.exe
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-wasm:
    needs: create-release
    name: Build WebAssembly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v16
        with:
          version: 3.1.65
          actions-cache-folder: 'emsdk-cache'

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Configure CMake (WASM)
        run: |
          export EM_CONFIG="$EMSDK/.emscripten"
          emcmake cmake -B build-wasm \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DENABLE_WERROR=OFF \
            -DZITH_VERSION=${{ needs.create-release.outputs.tag }} \
            -DCMAKE_CROSSCOMPILING=ON
        shell: bash

      - name: Build WASM
        run: cmake --build build-wasm --config Release -j$(nproc)
        shell: bash

      - name: Prepare Artifact
        run: |
          mkdir -p artifacts wasm-staging
          if [ -d "build-wasm/bin" ]; then cp build-wasm/bin/* wasm-staging/; fi
          find build-wasm -maxdepth 1 -type f \( -name "*.wasm" -o -name "*.js" -o -name "*.html" \) -exec cp {} wasm-staging/ \;
          cd wasm-staging && zip -r ../artifacts/zith-wasm.zip . && cd ..
        shell: bash

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: artifacts/zith-wasm.zip
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}