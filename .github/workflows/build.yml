name: Build and Release

on:
  push:
    tags:
      - 'v.*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            target_name: kalidous-linux-amd64
            
          # macOS (Intel)
          - os: macos-13 # Intel runner
            target_name: kalidous-macos-amd64
            
          # macOS (Apple Silicon - M1/M2/M3)
          - os: macos-latest # ARM runner (macos-14+)
            target_name: kalidous-macos-arm64
            
          # Windows (Intel/AMD)
          - os: windows-latest
            target_name: kalidous-windows-amd64.exe
            
          # Windows (ARM64)
          - os: windows-latest
            target_name: kalidous-windows-arm64.exe
            # We need to tell CMake to target ARM64 on Windows
            cmake_arch: -A ARM64

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.26.x'

      - uses: seanmiddleditch/gha-setup-ninja@master

      - name: Setup MSVC Dev Cmd
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        # Pass the architecture flag if it exists in the matrix
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_arch }}

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ runner.os }}" == "Windows" ]; then
            cp build/Kalidous.exe artifacts/${{ matrix.target_name }}
          else
            chmod +x build/Kalidous
            cp build/Kalidous artifacts/${{ matrix.target_name }}
          fi

      # --- This was separated in your snippet, now connected properly ---
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-void-musl:
    name: Build Void Linux (musl x86_64)
    runs-on: ubuntu-latest
    container: voidlinux/void-musl:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          xbps-install -Suy xbps
          xbps-install -Suy cmake ninja gcc make pkg-config

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare Artifact
        run: |
          mkdir -p artifacts
          chmod +x build/Kalidous
          cp build/Kalidous artifacts/kalidous-void-linux-amd64-musl

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/kalidous-void-linux-amd64-musl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}